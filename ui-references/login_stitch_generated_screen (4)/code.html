</div>
<div>

<a class="text-xs font-semibold text-primary hover:text-sage-dark transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<input class="w-full h-12 rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 px-4 pr-12 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none" placeholder="Enter your password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<button class="w-full h-12 bg-primary hover:bg-sage-dark text-white font-semibold rounded-xl transition-all transform active:scale-[0.98] shadow-md shadow-primary/10 mt-2" type="submit">
                        Login

</form>
<div class="relative my-8">

<div class="w-full border-t border-slate-100 dark:border-slate-800"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white dark:bg-slate-900 px-4 text-slate-400 font-medium tracking-wider">Or continue with</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">

<span class="text-sm font-medium">Google</span>

</div>
<div class="mt-8 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">

</p>
</div>
</div>
<div class="mt-8 grid grid-cols-2 gap-4 w-full px-4">
<div class="flex flex-col items-center text-center p-4 rounded-xl bg-sage-soft/30 dark:bg-slate-800/50">

<span class="text-xs font-medium text-slate-600 dark:text-slate-400 uppercase tracking-wider">Track Progress</span>
</div>
<div class="flex flex-col items-center text-center p-4 rounded-xl bg-sage-soft/30 dark:bg-slate-800/50">
<span class="material-symbols-outlined text-primary mb-2">monitoring</span>
<span class="text-xs font-medium text-slate-600 dark:text-slate-400 uppercase tracking-wider">Health Insights</span>
</div>
